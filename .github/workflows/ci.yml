name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12", "3.13", "3.14"]
        # one job per non-Linux OS catches MSVC / Apple clang breakage
        # before the release workflow does
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 numpy pandas scipy pytest hypothesis
      - name: Build and install
        run: pip install -e .
      - name: Run tests
        run: pytest tests/ -v --tb=short

  package-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest numpy pandas scipy
          python -m build
          twine check dist/*
          python -c "import glob, zipfile; p=glob.glob('dist/*.whl')[0]; names=zipfile.ZipFile(p).namelist(); assert not any(n.startswith('tests/') for n in names)"
          pip install --force-reinstall dist/*.whl
          cd /tmp
          python -m pytest "$GITHUB_WORKSPACE/tests" -q --import-mode=importlib

  sanitize-python:
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: "-fsanitize=address,undefined -fno-omit-frame-pointer"
      LDFLAGS: "-fsanitize=address,undefined"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build with ASan and UBSan
        run: |
          pip install pybind11 numpy pandas scipy pytest
          pip install --no-build-isolation -e .
      - name: Run sanitizer suite
        env:
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libasan.so.8
          ASAN_OPTIONS: detect_leaks=0
        run: pytest tests -q

  test-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("Rcpp", "testthat"))'
      - name: Install package
        run: R CMD INSTALL .
      - name: Run testthat suite
        run: Rscript -e "res <- testthat::test_dir('tests/testthat', package = 'fastroll'); if (any(as.data.frame(res)\$failed > 0)) quit(status = 1)"

  check-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("Rcpp", "testthat"))'
      - name: Build source package
        run: R CMD build .
      - name: R CMD check
        run: |
          R CMD check --no-manual fastroll_*.tar.gz
          # require a completely clean check, including no NOTE
          grep -q "^Status: OK" fastroll.Rcheck/00check.log
