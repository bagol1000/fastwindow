name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.12", "3.13", "3.14"]
        # one job per non-Linux OS catches MSVC / Apple clang breakage
        # before the release workflow does
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 numpy pandas scipy pytest
      - name: Build and install
        run: pip install -e .
      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("Rcpp", "testthat"))'
      - name: Install package
        run: R CMD INSTALL .
      - name: Run testthat suite
        run: Rscript -e "res <- testthat::test_dir('tests/testthat', package = 'fastroll'); if (any(as.data.frame(res)\$failed > 0)) quit(status = 1)"

  check-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("Rcpp", "testthat"))'
      - name: Build source package
        run: R CMD build .
      - name: R CMD check
        run: |
          R CMD check --no-manual fastroll_*.tar.gz
          # fail on any ERROR or WARNING in the check log
          ! grep -E "^(ERROR|WARNING)" fastroll.Rcheck/00check.log
