name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          # skip 32-bit targets: numpy no longer ships 32-bit wheels so the build dep can't resolve
          CIBW_SKIP: "*-musllinux_i686 *_i686 *-win32"
          # -march=native is not portable across machines; wheels use the
          # baseline ISA and the scalar fallbacks guarded by __AVX2__.
          CIBW_ENVIRONMENT: "FASTWINDOW_PORTABLE=1"
          CIBW_TEST_REQUIRES: "pytest numpy pandas scipy"
          CIBW_TEST_COMMAND: "pytest {project}/tests -x -q"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-r-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install Rcpp
        run: Rscript -e 'install.packages("Rcpp")'
      - name: Build source package
        run: R CMD build .
      - uses: actions/upload-artifact@v4
        with:
          name: r-tarball
          path: fastroll_*.tar.gz

  release:
    needs: [build-wheels, build-r-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach wheels and R tarball to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.whl
            artifacts/fastroll_*.tar.gz
